name: Bulk create student accounts

# Run manually from the Actions tab — never on every push,
# since this creates real Auth accounts and writes to the students table.
on:
  workflow_dispatch: {}

jobs:
  bulk-create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run bulk create script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEFAULT_PASSWORD: ${{ secrets.DEFAULT_PASSWORD }}
        run: node bulk_create_students.js

      # Results log won't survive after the job ends unless we save it here
      - name: Upload results log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulk-create-results
          path: bulk_create_results.csv
