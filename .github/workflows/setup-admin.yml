name: Setup Admin Account

# ใช้ workflow_dispatch เพื่อให้เราสามารถกดปุ่ม Run ได้เองจากหน้าเว็บ GitHub
on:
  workflow_dispatch:

jobs:
  create-admin:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Supabase JS
        # ติดตั้งแพ็กเกจที่จำเป็นสำหรับรันสคริปต์
        run: npm install @supabase/supabase-js

      - name: 🚀 Run Create Admin Script
        # ดึงค่า Secrets จาก GitHub มาใส่ใน Environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/create-admin.js
