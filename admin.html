<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการเรื่องร้องเรียนสภานักเรียน | PRSC Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Prompt:wght@500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        prsc: { red: '#D32F2F', navy: '#0B132B', light: '#F8FAFC' }
                    },
                    fontFamily: {
                        sans: ['"IBM Plex Sans Thai"', 'sans-serif'],
                        heading: ['"Prompt"', '"IBM Plex Sans Thai"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 text-slate-800 antialiased font-sans">

    <header class="bg-prsc-navy text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-prsc-red rounded-full flex items-center justify-center font-bold text-md font-heading">A</div>
                <span class="font-bold text-md font-heading">PRSC: Admin Portal</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="admin-email" class="text-xs text-slate-300 font-medium"></span>
                <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg font-medium transition shadow">
                    <i class="fa-solid fa-arrow-left mr-1"></i> กลับหน้าหลัก
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-prsc-navy font-heading">กล่องรับเรื่องร้องเรียน (The Hive)</h1>
                <p class="text-slate-500 text-sm mt-1">อัปเดตและติดตามปัญหาจากเพื่อน ๆ นักเรียนพิริยาลัย</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-status" class="bg-white border border-slate-300 rounded-xl px-4 py-2 text-sm font-medium outline-none focus:ring-2 focus:ring-prsc-red">
                    <option value="all">ทั้งหมด</option>
                    <option value="pending">🟡 รอดำเนินการ</option>
                    <option value="ongoing">🔵 กำลังประสานงาน</option>
                    <option value="solved">🟢 แก้ไขเสร็จสิ้น</option>
                </select>
            </div>
        </div>

        <div id="complaints-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-slate-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-prsc-red"></i>
                <p class="text-sm font-medium">กำลังเชื่อมต่อรังผึ้งเพื่อดึงข้อมูล...</p>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 max-w-xs w-full pointer-events-none"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
